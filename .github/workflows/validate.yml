name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - name: Install validation dependencies
        run: npm ci
      - name: Validate plugin package
        run: bash scripts/validate.sh
